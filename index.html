<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Tennis</title>
    <meta name="description" content="Save Tennis. Do it.">
    <link rel="canonical" href="https://save.tennis/">
    <meta name="google-site-verification" content="arqR30lBDPxlMHwpaQ92wjgxIhh8NmbcBxC4ClCoAF4">

    <!-- Open Graph -->
    <meta property="og:title" content="Save Tennis">
    <meta property="og:description" content="Save Tennis. Do it.">
    <meta property="og:image" content="https://save.tennis/save_tennis_sticker.png">
    <meta property="og:url" content="https://save.tennis/">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Save Tennis">
    <meta name="twitter:description" content="Save Tennis. Do it.">
    <meta name="twitter:image" content="https://save.tennis/save_tennis_sticker.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Save Tennis Sticker",
      "image": "https://save.tennis/save_tennis_sticker.png",
      "description": "Save Tennis. Do it.",
      "offers": {
        "@type": "Offer",
        "price": "2.99",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock",
        "url": "https://save.tennis/"
      }
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-text {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1.2;
            text-transform: lowercase;
            margin-bottom: 60px;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
        }

        .sticker-container {
            text-align: center;
        }

        .sticker-image {
            max-width: 150px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .buy-link {
            display: inline-block;
            background-color: #fff;
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
        }

        .buy-link:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }

        .price {
            color: #fff;
            font-size: 20px;
            margin-bottom: 15px;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .main-text {
                margin-bottom: 40px;
            }
            
            .sticker-image {
                max-width: 120px;
            }

            .buy-link {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="main-text">do it.</div>
    
    <div class="sticker-container">
        <img src="save_tennis_sticker.png" alt="Save Tennis sticker" class="sticker-image">
        <div class="price">$2.99</div>
        <a href="https://buy.stripe.com/5kQaEX3whfn71Bc3DS5kk00" class="buy-link">Buy Sticker</a>
    </div>
</body>
</html>
